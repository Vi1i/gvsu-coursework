<doctype html>
<html>
	<head>
		<meta content="text/html;charset=utf-8" http-equiv="Content-Type">
		<meta content="utf-8" http-equiv="encoding">

		<link href="http://getbootstrap.com/dist/css/bootstrap.min.css" rel="stylesheet">
		<script src="http://d3js.org/d3.v4.min.js" charset="utf-8"></script>
	</head>
	<body>
		<div class="container">
			<div class="jumbotron">
				<svg id="visulization" width="1000" height="500"
					viewBox="0 0 1000 500"
					preserveAspectRatio="xMidYMid meet">
				</svg>

				<script>
					var svg = d3.select("#visulization"),
					margin = {top: 20, right: 20, bottom: 30, left: 50},
					width = +svg.attr("width") - margin.left - margin.right,
					height = +svg.attr("height") - margin.top - margin.bottom,
					graph = svg.append("g").attr("transform", "translate(" + margin.left + "," + margin.top + ")");

					var parseTime = d3.timeParse("%m/%d/%Y");
					var x = d3.scaleTime().rangeRound([0, width]);
					var y = d3.scaleLinear().rangeRound([height, 0]);
					var line = d3.line()
						.x(function(d) { return x(d["Trans Date"]); })
						.y(function(d) { return y(d.Total); });
					var total = 0;
					d3.csv("/data/creditCard-mod.csv", function(d) {
						// This little block turns the data into d3 readable
						d["Trans Date"] = parseTime(d["Trans Date"]);
						d["Post Date"] = parseTime(d["Post Date"]);
						d.Amount = +d.Amount;
						total += d.Amount;
						d.Total = total;
						return d;
					}, function(error, data) {
						if (error) throw error;

						x.domain(d3.extent(data, function(d) { return d["Trans Date"]; }));
						y.domain(d3.extent(data, function(d) { return d.Total; }));

						graph.append("g")
							.attr("transform", "translate(0," + height + ")")
							.call(d3.axisBottom(x))
							.select(".domain")
							.remove();

						graph.append("g")
							.attr('transform', 'translate(' + 0 + ', ' + y(0) + ')')
							.call(d3.axisBottom(x).tickSizeInner(0).tickFormat("").tickSizeOuter(0))
							.select(".domain")

						graph.append("g")
							.call(d3.axisLeft(y))
							.append("text")
							.attr("fill", "#000")
							.attr("transform", "rotate(-90)")
							.attr("y", 6)
							.attr("dy", "0.71em")
							.attr("text-anchor", "end")
							.text("Price ($)");

						graph.append("path")
							.datum(data)
							.attr("fill", "none")
							.attr("stroke", "steelblue")
							.attr("stroke-linejoin", "round")
							.attr("stroke-linecap", "round")
							.attr("stroke-width", 1.5)
							.attr("d", line);

					});
				</script>
			</div>
		</div>
	</body>
</html>
